name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Preprocessing ETL
      run: |
        python preprocessing/automate_Muhammad-Falah-Akbar-Al-Faiz.py

    - name: Upload Preprocessed Dataset Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Telco-Customer-Churn-Preprocessed-Data
        path: preprocessing/Telco_customer_churn_preprocessing/
        retention-days: 7
